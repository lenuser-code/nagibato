name: Deploy JSDoc to GitHub Pages

on:
  push:
    branches:
      - main  # mainブランチに更新があったら実行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        # ここが checkout になっていました。setup-node に修正します。
        uses: actions/setup-node@v4
        with:
          # Node.js 20の警告が出ているので、2026年現在のLTSである 22 に上げます
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate Documentation
        # jsdoc.json がリポジトリにあることが前提です
        run: npx jsdoc -c jsdoc.json

      - name: Deploy to GitHub Pages
        # バージョンを v3 から最新の v4 に更新しておきます
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs  # jsdoc.jsonで指定した出力先
