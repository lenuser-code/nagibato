name: Deploy JSDoc to GitHub Pages

on:
  push:
    branches:
      - main  # mainブランチに更新があったら実行

# ここを追加！GitHub Actionsの裏側を最新環境(Node 24)で動かすおまじない
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # 私たちのJSDoc生成用は安定版の22でOK

      - name: Install dependencies
        run: npm install

      - name: Generate Documentation
        run: npx jsdoc -c jsdoc.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs  # jsdoc.jsonで指定した出力先
