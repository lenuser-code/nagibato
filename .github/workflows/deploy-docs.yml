name: Deploy JSDoc to GitHub Pages

on:
  push:
    branches:
      - main

# 【重要】GitHub Actionsに「書き込み権限」を明示的に与えます
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        # package.jsonの内容に基づいてjsdocをインストールします
        run: npm install

      - name: Generate Documentation
        # package.jsonのscriptsで定義した "generate-docs" を実行します
        run: npm run generate-docs

      - name: Prepare files for deployment
        run: |
          mkdir release
          # ゲームの実行に必要なファイル（HTML, JSなど）を release にコピー
          cp *.js *.html release/ 2>/dev/null || true
          cp -r image release/ 2>/dev/null || true
          # 生成された docs フォルダも release の中に入れる
          cp -r docs release//
          # release/indedx.htmlを作る
          npx marked -i README.md -o release/index.html
          sed -i '1i <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css"><style>body{box-sizing:border-box;min-width:200px;max-width:980px;margin:0 auto;padding:45px;}</style><article class="markdown-body">' release/index.html
          echo "</article>" >> release/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./release  # ここを ./docs から ./release に変更
