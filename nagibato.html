//*** 1. タイトル画面

// 途中に挟むページ

const intermediateScene = new Scene({
    step: 0,
    constructor(){
        this.add(T.image(GE.caches.get("BACKGROUND"), {x: 0, y: 0}));
    },
    onLoad(GE, args){
        if(this.step == 0){
            this.args = args;
            this.deck = args.deck;
            this.sideboard = args.sideboard;
            const practiceData = {...args};
            practiceData.enemyData = null;
            practiceData.deck = this.deck.clone();
            practiceData.sideboard = this.sideboard.clone();
            this.step++;
            GE.changeScene("main", practiceData);
        }
        else if(this.step == 1){
            const mainData = {...this.args};
            mainData.deck = this.deck.clone();
            mainData.sideboard = this.sideboard.clone();
            this.step++;
            GE.changeScene("main", mainData);
        }
        else{
            this.step = 0;
            GE.changeScene("select");
        }
    }
});

// UIの構成要素

class SelectWindow{
    constructor(menu, action, rowCount, x, y, w, h){
        this.menu = menu;
        this.action = action;
        this.rowCount = rowCount;
        this.scroll = 0;
        this.r = 0;

        this.x = x;
        this.y = y;
        this.step = 60;
        this.padY = 40 + (h - this.step * rowCount) / 2;
        this.width = w;
        this.height = h;
        this.busy = 0;
    }

    selectedIndex(){
        return this.scroll + this.r;
    }

    draw(GE, ctx){
        ctx.save();
        ctx.fillStyle = "rgb(0,0,0,0.5)";
        ctx.fillRect(this.x, this.y, this.width, this.height);

        ctx.font = "42px monospace";
        ctx.fillStyle = "white";
        const m = ctx.measureText("→_");
        const ax = this.x + 30;
        const ay = this.y + this.padY + this.r*this.step;
        const aw = m.width;
        ctx.fillText("→", ax, ay);

        for(let i = 0; i < this.rowCount; i++){
            const n = this.scroll + i;
            if(n < this.menu.length){
                ctx.fillText(this.menu[n], ax+aw, this.y+this.padY+this.step*i);
            }
            else break;
        }
        if(this.scroll > 0){
            ctx.font = "20px Sans-Serif";
            ctx.textAlign = "center";
            ctx.fillText("▲", this.x + this.width/2, this.y + this.padY-this.step);
        }
        if(this.rowCount < this.menu.length && this.scroll < this.menu.length-this.rowCount){
            ctx.font = "20px Sans-Serif";
            ctx.textAlign = "center";
            ctx.fillText("▼", this.x + this.width/2, this.y+this.padY+this.step*(this.rowCount-1)+40);
        }
        ctx.restore();
    }

    checkInput(GE){
        if(this.busy > 0) this.busy--;
        return GE.input.checkInput(
            ["ArrowUp", "ArrowDown", "KeyA", "KeyS"],
            ["ArrowUp", "ArrowDown"],
            this.busy
        );
    }

    execute(GE){
        const [code, k] = this.checkInput(GE);
        if(k == 0){
            if(this.r > 0) this.r--;
            else if(this.scroll > 0) this.scroll--;
            this.busy = 10;
        }
        if(k == 1){
            if(this.selectedIndex() < this.menu.length - 1){
                if(this.r < this.rowCount-1) this.r++;
                else this.scroll++;
            }
            this.busy = 10;
        }
        if(k == 2){
            this.action(this.selectedIndex());
            this.busy = 10;
        }
        if(k == 3){
            this.active = false;
            this.busy = 10;
        }
        return false;
    }
}

class Booklike{
    static boxColors = [ "rgb(239,228,176)", "rgb(195,195,195)"];
    static textColors = [ "rgb(255,100,0)", "gray" ];
    static borderColor = "rgb(0,20,40)";

    constructor(text, x, y, w, h, action = null){
        this.text = text;
        this.action = action;
        this.x = x;
        this.y = y;
        this.width = w;
        this.height = h;
    }

    open(GE, scene){
        if(this.action) this.action(GE, scene, this);
    }

    draw(GE, ctx){
        ctx.save();
        const x = this.selected ? this.x - this.width*0.2 : this.x;
        ctx.fillStyle = Booklike.borderColor;
        ctx.fillRect(x, this.y, this.width, this.height);
        ctx.fillStyle = Booklike.boxColors[this.selected ? 0 : 1];
        ctx.fillRect(x+5, this.y+5, this.width-10, this.height-10);

        ctx.font = this.selected ? "bold 32px Serif" : "32px Serif";
        ctx.fillStyle = Booklike.textColors[this.selected ? 0 : 1];
        ctx.fillText(this.text, x+20, this.y+40);
        ctx.restore();
    }
}

class Shelflike{
    static boxColor = "rgb(30,30,30)";
    static borderColor = "rgb(10,10,10)";

    constructor(owner, books, x, y, w, h){
        this.owner = owner;
        this.x = x;
        this.y = y;
        this.width = w;
        this.height = h;
        this.books = books;
        books[0].selected = true;
        this.index = 0;
        this.busy = 0;
    }

    draw(GE, ctx){
        ctx.save();
        ctx.fillStyle = Shelflike.borderColor;
        ctx.fillRect(this.x-5, this.y-5, this.width+10, this.height*this.books.length+10);
        ctx.fillStyle = Shelflike.boxColor;
        ctx.fillRect(this.x, this.y, this.width, this.height*this.books.length);
        ctx.restore();
    }

    checkInput(GE){
        if(this.busy > 0) this.busy--;
        return GE.input.checkInput(
            ["ArrowUp", "ArrowDown", "KeyA"],
            ["ArrowUp", "ArrowDown"],
            this.busy
        );
    }

    execute(GE){
        const [code, i] = this.checkInput(GE);
        if(i == 0){
            this.books[this.index].selected = false;
            this.index = (this.index + this.books.length - 1) % this.books.length;
            this.books[this.index].selected = true;
            this.busy = 12;
        }
        if(i == 1){
            this.books[this.index].selected = false;
            this.index = (this.index + 1) % this.books.length;
            this.books[this.index].selected = true;
            this.busy = 12;
        }
        if(i == 2){
            this.books[this.index].open(GE, this.owner);
            this.busy = 12;
            return false;
        }
        return true;
    }
}

// シーンの作成

const selectScene = new Scene({
chainRule: { value: 1 },

battleSelected(opt){
    this.yesno = createConfirmatingQB_BeforeBattle(this.setting);
    this.yesno.opt = opt;
    this.addSprite(this.yesno);
    this.addTask(this.yesno, true);
},
execute(GE){
    if(this.yesno && !this.yesno.active){
        const ans = this.yesno.result;
        const opt = this.yesno.opt;
        this.yesno = null;
        if(ans){
            const deckObj = new Deck(this.setting.deckSet.cards);
            const sideboardObj = new Deck(this.setting.sideboardSet.cards);
            const mainCard = CardAtlas.get(this.setting.mainCardData.id);
            deckObj.remove(mainCard);
            sideboardObj.remove(mainCard);
            deckObj.shuffle();
            opt2 = {
                deck: deckObj, sideboard: sideboardObj,
                playerData: this.setting.mainCardData,
                chainRule: this.setting.chainRule, ...opt
            };
            GE.changeScene("intermediate", opt2);
        }
    }
},

actions:  [
    function(GE, scene, book){
        const values =  [
            {enemyData: EnemyData["ゲルトルート"], tutorial: ["これはQBLectureのテストです", "ゲルトルートと戦うとき\nこのメッセージが表示されます", "きゅっぷい"]},
            {enemyData: EnemyData["イザベル"]},
            {enemyData: EnemyData["ギーゼラ"]},
            {enemyData: EnemyData["シャルロッテ"]},
            {enemyData: EnemyData["パトリシア"]},
            {enemyData: EnemyData["エルザマリア"]},
            {enemyData: EnemyData["H.N.エリー"]},
            {enemyData: EnemyData["ロベルタ"]},
            {enemyData: EnemyData["オクタヴィア"]},
            {enemyData: EnemyData["ワルプルギスの夜"]},
            {enemyData: EnemyData["ナイトメア"]},
            {enemyData: EnemyData["ホムリリー"]}
        ];
        const menu = values.map((e) => e.enemyData.name);
        const op = (i) => {
            scene.battleSelected(values[i]);
        };
        const sw = new SelectWindow(menu, op, 6, 50, 180, 700, 450);
        scene.addSprite(sw);
        scene.addTask(sw, true);
    },
    function(GE, scene, book){
        const opt = {set1: scene.deckSet, set2: scene.sideboardSet};
        GE.se.play("optionSelected");
        GE.changeScene("edit", opt);
    },
    function(GE, scene, book){
        //const opt = {deck: scene.deckSet.cards, mainCard: scene.mainCardData, chainRule: scene.chainRule};
        GE.se.play("optionSelected");
        GE.changeScene("config", scene.setting);
    }
],

initShelf(){
    this.books = [
        new Booklike("魔女を選んでバトル",  600, 300, 360, 60, this.actions[0]),
        new Booklike("デッキ編集", 600, 360, 360, 60, this.actions[1]),
        new Booklike("設定", 600, 420, 360, 60, this.actions[2])
    ];
    this.shelf = new Shelflike(this, this.books, 600, 300, 360, 60);
},

initData(){
    CardAtlas.init();
    const usedCards = [];
    const sideboardCards = [];

    let configData = [ "2-039", 1 ];
    if(LocalStorageInfo.isUsed()){
        const IDs = LocalStorageInfo.deckInfo;
        CardAtlas.forEach((card) => {
            if(IDs.includes(card.cardAtlasID)) usedCards.push(card);
            else sideboardCards.push(card);
        });
        configData = LocalStorageInfo.config;
    }
    else{
        CardAtlas.forEach((card) => {
            if(card.value < 8 || (card.mark > 5 && card.value < 10)) sideboardCards.push(card);
            else usedCards.push(card);
        });
    };
    this.setting = {
        deckSet: new CardSet(usedCards),
        sideboardSet: new CardSet(sideboardCards),
        mainCardData: {...RAW_CARD_DATA.find((e) => e.id == configData[0])},
        chainRule: configData[1]
    };
},

onLoad(GE, args){
    if(!this.setting) this.initData();
    if(this.shelf) return;
    this.initShelf();
    this.add(T.image(GE.caches.get("BACKGROUND"), {x: 0, y: 0}));
    this.add(T.text("MAGICARD BATTLE", {x: 50, y:130, color: "white", font: "60px monospace"}));
    this.add(T.text("シミュレータ", {x: 520, y:130, color: "white", font: "30px monospace"}));
    this.add(T.text("A : 決定,  S : キャンセル,  矢印キー : 移動", {x: 50, y:650, color: "white", font: "30px monospace"}));

    this.add(this.shelf);
    for(const book of this.books){
        this.add(book);
    }
}
});
